x-airflow-common:
  &airflow-common-env
  AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${POSTGRES_USER}:${POSTGRES_PASSWORD}@${AIRFLOW_DB_HOST}/${POSTGRES_DB}
  AIRFLOW__CORE__EXECUTOR: LocalExecutor
  AIRFLOW__CORE__EXECUTION_API_SERVER_URL: 'http://airflow-apiserver:8080/execution/'
  AIRFLOW__API_AUTH__JWT_SECRET: ${AIRFLOW__API_AUTH__JWT_SECRET:-airflow_jwt_secret}
  AIRFLOW__API_AUTH__JWT_ISSUER: ${AIRFLOW__API_AUTH__JWT_ISSUER:-airflow}
  AIRFLOW__API__SECRET_KEY: ${AIRFLOW__API__SECRET_KEY:-api_secret_key}

networks:
  siem-net:
    driver: bridge

services:
  minio:
    image: quay.io/minio/minio:latest
    container_name: siem-minio
    ports:
      - "9000:9000"        # S3 API Endpoint
      - "9001:9001"        # Web Console
    environment:
      MINIO_ROOT_USER: ${MINIO_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_PASSWORD}
    volumes:
      - ./minio/data:/data
    command: server /data --console-address ":9001"
    networks:
      - siem-net

  kafka_1:
    image: confluentinc/cp-kafka:latest
    hostname: kafka_1
    container_name: kafka_1
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_BROKER_ID: 1
      KAFKA_PROCESS_ROLES: 'broker,controller'
      KAFKA_CONTROLLER_QUORUM_VOTERS: '1@kafka_1:19093,2@kafka_2:19093,3@kafka_3:19093'
      KAFKA_LISTENERS: 'INTERNAL://kafka_1:19092,EXTERNAL://0.0.0.0:9092,CONTROLLER://kafka_1:19093'
      KAFKA_ADVERTISED_LISTENERS: 'INTERNAL://kafka_1:19092,EXTERNAL://localhost:9092'
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: 'INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT'
      KAFKA_CONTROLLER_LISTENER_NAMES: 'CONTROLLER'
      KAFKA_INTER_BROKER_LISTENER_NAME: 'INTERNAL'
      CLUSTER_ID: 'AEwq7cqhRkKqoOCkVDoRfg'
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 3
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_DEFAULT_REPLICATION_FACTOR: 3
      KAFKA_MIN_INSYNC_REPLICAS: 2
    volumes:
      - ./.kafka-storage/kafka-1/data:/var/lib/kafka/data
    networks:
      - siem-net

  kafka_2:
    image: confluentinc/cp-kafka:latest
    hostname: kafka_2
    container_name: kafka_2
    ports:
      - "9094:9094"
    environment:
      KAFKA_NODE_ID: 2
      KAFKA_BROKER_ID: 2
      KAFKA_PROCESS_ROLES: 'broker,controller'
      KAFKA_CONTROLLER_QUORUM_VOTERS: '1@kafka_1:19093,2@kafka_2:19093,3@kafka_3:19093'
      KAFKA_LISTENERS: 'INTERNAL://kafka_2:19092,EXTERNAL://0.0.0.0:9094,CONTROLLER://kafka_2:19093'
      KAFKA_ADVERTISED_LISTENERS: 'INTERNAL://kafka_2:19092,EXTERNAL://localhost:9094'
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: 'INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT'
      KAFKA_CONTROLLER_LISTENER_NAMES: 'CONTROLLER'
      KAFKA_INTER_BROKER_LISTENER_NAME: 'INTERNAL'
      CLUSTER_ID: 'AEwq7cqhRkKqoOCkVDoRfg'
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 3
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_DEFAULT_REPLICATION_FACTOR: 3
      KAFKA_MIN_INSYNC_REPLICAS: 2
    volumes:
      - ./.kafka-storage/kafka-2/data:/var/lib/kafka/data
    networks:
      - siem-net

  kafka_3:
    image: confluentinc/cp-kafka:latest
    hostname: kafka_3
    container_name: kafka_3
    ports:
      - "9096:9096"
    environment:
      KAFKA_NODE_ID: 3
      KAFKA_BROKER_ID: 3
      KAFKA_PROCESS_ROLES: 'broker,controller'
      KAFKA_CONTROLLER_QUORUM_VOTERS: '1@kafka_1:19093,2@kafka_2:19093,3@kafka_3:19093'
      KAFKA_LISTENERS: 'INTERNAL://kafka_3:19092,EXTERNAL://0.0.0.0:9096,CONTROLLER://kafka_3:19093'
      KAFKA_ADVERTISED_LISTENERS: 'INTERNAL://kafka_3:19092,EXTERNAL://localhost:9096'
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: 'INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT'
      KAFKA_CONTROLLER_LISTENER_NAMES: 'CONTROLLER'
      KAFKA_INTER_BROKER_LISTENER_NAME: 'INTERNAL'
      CLUSTER_ID: 'AEwq7cqhRkKqoOCkVDoRfg'
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 3
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_DEFAULT_REPLICATION_FACTOR: 3
      KAFKA_MIN_INSYNC_REPLICAS: 2
    volumes:
      - ./.kafka-storage/kafka-3/data:/var/lib/kafka/data
    networks:
      - siem-net

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: kafka-cluster-ui
    ports:
      - "8080:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local-siem-cluster
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka_1:19092,kafka_2:19092,kafka_3:19092
    depends_on:
      - kafka_1
      - kafka_2
      - kafka_3
    networks:
      - siem-net

  postgres:
    image: postgres:16
    container_name: airflow-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres-db-volume:/var/lib/postgresql/data
    networks:
      - siem-net
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "airflow"]
      interval: 10s
      retries: 5
      start_period: 5s

  airflow-init:
    image: apache/airflow:3.2.2
    container_name: airflow-init
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      <<: *airflow-common-env
    command: >
      bash -c "airflow db migrate"
    networks:
      - siem-net
    user: "0:0"

  airflow-scheduler:
    build:
      context: .
      dockerfile: Dockerfile.airflow-spark
    container_name: airflow-scheduler
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    environment:
      <<: *airflow-common-env
      AIRFLOW__CORE__LOAD_EXAMPLES: 'false'
      AIRFLOW__CORE__FERNET_KEY: ${AIRFLOW_FERNET_KEY}
      MINIO_USER: ${MINIO_USER}
      MINIO_PASSWORD: ${MINIO_PASSWORD}
      MINIO_ENDPOINT: http://siem-minio:9000
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - ./airflow/logs:/opt/airflow/logs
      - ./src/spark:/opt/airflow/spark_scripts
    command: scheduler
    networks:
      - siem-net
    user: "${AIRFLOW_UID:-50000}:0"

  airflow-apiserver:
    image: apache/airflow:3.2.2
    container_name: airflow-apiserver
    ports:
      - "8000:8080"
    depends_on:
      airflow-scheduler:
        condition: service_started
    environment:
      <<: *airflow-common-env
      AIRFLOW__CORE__LOAD_EXAMPLES: 'false'
      AIRFLOW__CORE__FERNET_KEY: ${AIRFLOW_FERNET_KEY}
    command: api-server
    networks:
      - siem-net
    user: "${AIRFLOW_UID:-50000}:0"
  
  airflow-dag-processor:
    image: apache/airflow:3.2.2
    container_name: airflow-dag-processor
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    environment:
      <<: *airflow-common-env
      AIRFLOW__CORE__LOAD_EXAMPLES: 'false'
      AIRFLOW__CORE__FERNET_KEY: ${AIRFLOW_FERNET_KEY}
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - ./airflow/logs:/opt/airflow/logs
    command: dag-processor
    networks:
      - siem-net
    user: "${AIRFLOW_UID:-50000}:0"
  
  grafana:
    image: grafana/grafana:latest
    container_name: siem-grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_ADMIN_USER}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - siem-net

volumes:
  postgres-db-volume: