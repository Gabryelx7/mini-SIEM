# --- TEMPLATES ---
x-airflow-common:
  &airflow-common-env
  AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: >-
    postgresql+psycopg2://${POSTGRES_USER:-airflow}:${POSTGRES_PASSWORD:-airflow}@${AIRFLOW_DB_HOST:-postgres}/${POSTGRES_DB:-airflow}
  AIRFLOW__CORE__EXECUTOR: LocalExecutor
  AIRFLOW__CORE__EXECUTION_API_SERVER_URL: 'http://airflow-apiserver:8080/execution/'
  AIRFLOW__CORE__FERNET_KEY: ${AIRFLOW_FERNET_KEY:-}
  AIRFLOW__CORE__LOAD_EXAMPLES: 'false'
  AIRFLOW__API_AUTH__JWT_SECRET: ${AIRFLOW__API_AUTH__JWT_SECRET:-airflow_jwt_secret}
  AIRFLOW__API_AUTH__JWT_ISSUER: ${AIRFLOW__API_AUTH__JWT_ISSUER:-airflow}
  AIRFLOW__API__SECRET_KEY: ${AIRFLOW__API__SECRET_KEY:-api_secret_key}

x-spark-job:
  &spark-job-template
  build:
    context: ./src/spark
    dockerfile: Dockerfile.spark
  environment:
    MINIO_USER: ${MINIO_USER}
    MINIO_PASSWORD: ${MINIO_PASSWORD}
    MINIO_ENDPOINT: http://siem-minio:9000
    KAFKA_PORT: kafka_1:19092
  networks:
    - siem-net
  depends_on:
    - minio
    - kafka_1
    - kafka_2
    - kafka_3

x-log-generator:
  &log-generator-template
  build:
    context: ./src/producers
    dockerfile: Dockerfile.generator
  environment:
    MINIO_USER: ${MINIO_USER}
    MINIO_PASSWORD: ${MINIO_PASSWORD}
    MINIO_ENDPOINT: http://siem-minio:9000
    KAFKA_PORT: kafka_1:19092
  networks:
    - siem-net
  depends_on:
    - kafka_1
    - kafka_2
    - kafka_3

networks:
  siem-net:
    driver: bridge

services:
  minio:
    image: quay.io/minio/minio:latest
    container_name: siem-minio
    ports:
      - "9000:9000"        # S3 API Endpoint
      - "9001:9001"        # Web Console
    environment:
      MINIO_ROOT_USER: ${MINIO_USER:-admin}
      MINIO_ROOT_PASSWORD: ${MINIO_PASSWORD:-password123}
    volumes:
      - ./infra/minio/data:/data
    command: server /data --console-address ":9001"
    networks:
      - siem-net

  kafka_1:
    image: confluentinc/cp-kafka:latest
    hostname: kafka_1
    container_name: kafka_1
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_BROKER_ID: 1
      KAFKA_PROCESS_ROLES: 'broker,controller'
      KAFKA_CONTROLLER_QUORUM_VOTERS: '1@kafka_1:19093,2@kafka_2:19093,3@kafka_3:19093'
      KAFKA_LISTENERS: 'INTERNAL://kafka_1:19092,EXTERNAL://0.0.0.0:9092,CONTROLLER://kafka_1:19093'
      KAFKA_ADVERTISED_LISTENERS: 'INTERNAL://kafka_1:19092,EXTERNAL://localhost:9092'
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: 'INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT'
      KAFKA_CONTROLLER_LISTENER_NAMES: 'CONTROLLER'
      KAFKA_INTER_BROKER_LISTENER_NAME: 'INTERNAL'
      CLUSTER_ID: 'AEwq7cqhRkKqoOCkVDoRfg'
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 3
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_DEFAULT_REPLICATION_FACTOR: 3
      KAFKA_MIN_INSYNC_REPLICAS: 2
    volumes:
      - ./infra/kafka-storage/kafka-1/data:/var/lib/kafka/data
    networks:
      - siem-net

  kafka_2:
    image: confluentinc/cp-kafka:latest
    hostname: kafka_2
    container_name: kafka_2
    ports:
      - "9094:9094"
    environment:
      KAFKA_NODE_ID: 2
      KAFKA_BROKER_ID: 2
      KAFKA_PROCESS_ROLES: 'broker,controller'
      KAFKA_CONTROLLER_QUORUM_VOTERS: '1@kafka_1:19093,2@kafka_2:19093,3@kafka_3:19093'
      KAFKA_LISTENERS: 'INTERNAL://kafka_2:19092,EXTERNAL://0.0.0.0:9094,CONTROLLER://kafka_2:19093'
      KAFKA_ADVERTISED_LISTENERS: 'INTERNAL://kafka_2:19092,EXTERNAL://localhost:9094'
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: 'INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT'
      KAFKA_CONTROLLER_LISTENER_NAMES: 'CONTROLLER'
      KAFKA_INTER_BROKER_LISTENER_NAME: 'INTERNAL'
      CLUSTER_ID: 'AEwq7cqhRkKqoOCkVDoRfg'
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 3
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_DEFAULT_REPLICATION_FACTOR: 3
      KAFKA_MIN_INSYNC_REPLICAS: 2
    volumes:
      - ./infra/kafka-storage/kafka-2/data:/var/lib/kafka/data
    networks:
      - siem-net

  kafka_3:
    image: confluentinc/cp-kafka:latest
    hostname: kafka_3
    container_name: kafka_3
    ports:
      - "9096:9096"
    environment:
      KAFKA_NODE_ID: 3
      KAFKA_BROKER_ID: 3
      KAFKA_PROCESS_ROLES: 'broker,controller'
      KAFKA_CONTROLLER_QUORUM_VOTERS: '1@kafka_1:19093,2@kafka_2:19093,3@kafka_3:19093'
      KAFKA_LISTENERS: 'INTERNAL://kafka_3:19092,EXTERNAL://0.0.0.0:9096,CONTROLLER://kafka_3:19093'
      KAFKA_ADVERTISED_LISTENERS: 'INTERNAL://kafka_3:19092,EXTERNAL://localhost:9096'
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: 'INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT'
      KAFKA_CONTROLLER_LISTENER_NAMES: 'CONTROLLER'
      KAFKA_INTER_BROKER_LISTENER_NAME: 'INTERNAL'
      CLUSTER_ID: 'AEwq7cqhRkKqoOCkVDoRfg'
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 3
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_DEFAULT_REPLICATION_FACTOR: 3
      KAFKA_MIN_INSYNC_REPLICAS: 2
    volumes:
      - ./infra/kafka-storage/kafka-3/data:/var/lib/kafka/data
    networks:
      - siem-net

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: kafka-cluster-ui
    ports:
      - "8080:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local-siem-cluster
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka_1:19092,kafka_2:19092,kafka_3:19092
    depends_on:
      - kafka_1
      - kafka_2
      - kafka_3
    networks:
      - siem-net

  postgres:
    image: postgres:16
    container_name: airflow-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-airflow}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-airflow}
      POSTGRES_DB: ${POSTGRES_DB:-airflow}
    volumes:
      - postgres-db-volume:/var/lib/postgresql/data
    networks:
      - siem-net
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "airflow"]
      interval: 10s
      retries: 5
      start_period: 5s

  airflow-init:
    image: apache/airflow:3.2.2
    container_name: airflow-init
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      <<: *airflow-common-env
    command: >
      bash -c "airflow db migrate"
    networks:
      - siem-net
    user: "0:0"

  airflow-scheduler:
    build:
      context: .
      dockerfile: Dockerfile.airflow-scheduler
    container_name: airflow-scheduler
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    environment:
      <<: *airflow-common-env
      MINIO_USER: ${MINIO_USER}
      MINIO_PASSWORD: ${MINIO_PASSWORD}
      MINIO_ENDPOINT: http://siem-minio:9000
      POSTGRES_USER: ${POSTGRES_USER:-airflow}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-airflow}
      POSTGRES_DB: ${POSTGRES_DB:-airflow}
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - ./airflow/logs:/opt/airflow/logs
      - ./src/spark:/opt/airflow/spark_scripts
    command: scheduler
    networks:
      - siem-net
    user: "${AIRFLOW_UID:-50000}:0"

  airflow-apiserver:
    image: apache/airflow:3.2.2
    container_name: airflow-apiserver
    ports:
      - "8000:8080"
    depends_on:
      airflow-scheduler:
        condition: service_started
    environment:
      <<: *airflow-common-env
    command: api-server
    networks:
      - siem-net
    user: "${AIRFLOW_UID:-50000}:0"
  
  airflow-dag-processor:
    image: apache/airflow:3.2.2
    container_name: airflow-dag-processor
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    environment:
      <<: *airflow-common-env
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - ./airflow/logs:/opt/airflow/logs
    command: dag-processor
    networks:
      - siem-net
    user: "${AIRFLOW_UID:-50000}:0"
  
  grafana:
    image: grafana/grafana:latest
    container_name: siem-grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_ADMIN_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:-admin}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - siem-net

  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    volumes:
      - ./infra/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"
    networks:
      - siem-net

  pushgateway:
    image: prom/pushgateway:latest
    container_name: siem-pushgateway
    ports:
      - "9091:9091"
    networks:
      - siem-net
  
  kafka-exporter:
    image: danielqsj/kafka-exporter:latest
    container_name: siem-kafka-exporter
    command: [
      "--kafka.server=kafka_1:19092", 
      "--kafka.server=kafka_2:19092", 
      "--kafka.server=kafka_3:19092"
    ]
    restart: always
    depends_on:
      - kafka_1
      - kafka_2
      - kafka_3
    networks:
      - siem-net
  
  # --- LOG GENERATORS ---
  generator-auth:
    <<: *log-generator-template
    command: ["python", "generate_auth_logs.py"]
    
  generator-firewall:
    <<: *log-generator-template
    command: ["python", "generate_firewall_events.py"]
  
  generator-api-gateway:
    <<: *log-generator-template
    command: ["python", "generate_api_gateway_logs.py"]
  
  # --- SPARK STRUCTURED STREAMING ---
  stream-bronze-auth:
    <<: *spark-job-template
    command: ["python", "bronze_pipeline.py", "auth_logs"]
  
  stream-bronze-firewall:
    <<: *spark-job-template
    command: ["python", "bronze_pipeline.py", "firewall_events"]
  
  stream-bronze-api-gateway:
    <<: *spark-job-template
    command: ["python", "bronze_pipeline.py", "api_gateway_logs"]
  
  stream-silver-auth:
    <<: *spark-job-template
    command: ["python", "silver_pipeline.py", "auth_logs"]
  
  stream-silver-firewall:
    <<: *spark-job-template
    command: ["python", "silver_pipeline.py", "firewall_events"]
  
  stream-silver-api-gateway:
    <<: *spark-job-template
    command: ["python", "silver_pipeline.py", "api_gateway_logs"]

  stream-gold-auth:
    <<: *spark-job-template
    command: ["python", "gold_pipeline.py", "auth_logs"]
  
  stream-gold-firewall:
    <<: *spark-job-template
    command: ["python", "gold_pipeline.py", "firewall_events"]
  
  stream-gold-api-gateway:
    <<: *spark-job-template
    command: ["python", "gold_pipeline.py", "api_gateway_logs"]

volumes:
  postgres-db-volume: